name: Steam free games Watchdog

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  send_report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.14
    
    - name: Run
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
        PORT: ${{ secrets.PORT }}
        HOST: ${{ secrets.HOST }}
        RECIPIENTS: ${{ secrets.RECIPIENTS }}
      run: |
        python -m run